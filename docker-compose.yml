services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jungle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bulletin_board}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bulletin_board}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mcp-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile.mcp
    container_name: jungle-mcp-server
    restart: unless-stopped
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    expose:
      - "8002"

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: jungle-ai-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-bulletin_board}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      MCP_SERVER_URL: http://mcp-server:8002/sse
    expose:
      - "8000"

  spring:
    build:
      context: ./bulletin
      dockerfile: Dockerfile
    container_name: jungle-spring
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ai-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bulletin_board}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      AI_SERVER_URL: http://ai-server:8000
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: never
    expose:
      - "8080"

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: jungle-nginx
    restart: unless-stopped
    depends_on:
      spring:
        condition: service_started
      ai-server:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres-data:
