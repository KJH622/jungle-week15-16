name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  spring:
    name: Spring test and bootJar
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: bulletin_board
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bulletin_board"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: bulletin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Create test application.properties
        run: |
          cat > src/main/resources/application.properties <<'EOF'
          spring.application.name=bulletin
          spring.datasource.url=jdbc:postgresql://localhost:5432/bulletin_board
          spring.datasource.username=postgres
          spring.datasource.password=postgres
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=false
          spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
          spring.jpa.defer-datasource-initialization=true
          spring.sql.init.mode=never
          jwt.secret=test-secret-test-secret-test-secret-1234
          jwt.expiration=86400000
          ai.server.url=http://localhost:8000
          EOF

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Build jar
        run: ./gradlew bootJar --no-daemon

  ai-server:
    name: AI server checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-server/requirements.txt

      - name: Install dependencies
        working-directory: ai-server
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile ai-server/database.py ai-server/main.py ai-server/mcp_server.py ai-server/auth.py ai-server/routers/rag.py ai-server/routers/agent.py ai-server/routers/mcp.py

      - name: Import FastAPI app
        env:
          OPENAI_API_KEY: test-key
          JWT_SECRET: test-secret-test-secret-test-secret-1234
        run: python -c "import sys; sys.path.insert(0, 'ai-server'); import main; from routers import rag, agent, mcp; print('ai-server imports ok')"

  docker-compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    needs: [frontend, spring, ai-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        env:
          POSTGRES_PASSWORD: test-password
          JWT_SECRET: test-secret-test-secret-test-secret-1234
          OPENAI_API_KEY: test-key
        run: docker compose config --quiet
