name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: ["completed"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='bulletin/build' \
            --exclude='ai-server/.env' \
            --exclude='ai-server/.venv' \
            --exclude='ai-server/__pycache__' \
            --exclude='ai-server/chroma_db' \
            --exclude='*.pyc' \
            -czf /tmp/jungle-week15-16.tar.gz .

      - name: Upload deployment archive
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/ec2_key /tmp/jungle-week15-16.tar.gz "$EC2_USER@$EC2_HOST:/tmp/jungle-week15-16.tar.gz"

      - name: Deploy with Docker Compose
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "EC2_APP_DIR='$EC2_APP_DIR' bash -s" <<'REMOTE'
            set -e

            RELEASE_DIR="$(mktemp -d)"
            mkdir -p "$EC2_APP_DIR"

            tar -xzf /tmp/jungle-week15-16.tar.gz -C "$RELEASE_DIR"

            if [ -f "$EC2_APP_DIR/.env.production" ]; then
              cp "$EC2_APP_DIR/.env.production" "$RELEASE_DIR/.env.production"
            fi

            if [ ! -f "$RELEASE_DIR/.env.production" ]; then
              echo "Missing $EC2_APP_DIR/.env.production"
              exit 1
            fi

            DOCKER="docker"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi

            if [ -f "$EC2_APP_DIR/current/docker-compose.yml" ]; then
              $DOCKER compose --env-file "$EC2_APP_DIR/.env.production" -f "$EC2_APP_DIR/current/docker-compose.yml" down --remove-orphans || true
            fi

            rm -rf "$EC2_APP_DIR/.previous"
            if [ -d "$EC2_APP_DIR/current" ]; then
              mv "$EC2_APP_DIR/current" "$EC2_APP_DIR/.previous"
            fi
            mv "$RELEASE_DIR" "$EC2_APP_DIR/current"
            cp "$EC2_APP_DIR/current/.env.production" "$EC2_APP_DIR/.env.production"

            cd "$EC2_APP_DIR/current"
            $DOCKER compose --env-file .env.production up -d --build
            $DOCKER image prune -f
            rm -f /tmp/jungle-week15-16.tar.gz
          REMOTE
